# pytest.ini
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=30
    --ignore=tests/test_integration.py
    --ignore=tests/test_websocket.py
markers =
    asyncio: marks tests as async
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow running
    websocket: marks tests related to WebSocket functionality
    monitoring: marks tests related to monitoring and logging

[coverage:run]
source = app
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*
    */migrations/*
    */conftest.py
