[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.env
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["app"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "uvicorn.*",
    "fastapi.*",
    "groq.*",
    "langchain.*",
    "mediapipe.*",
    "opencv.*",
    "librosa.*",
    "pydub.*",
    "pypdf.*",
    "faiss.*",
    "sentence_transformers.*",
    "playwright.*",
    "openai.*",
    "pyttsx3.*",
    "pyaudio.*",
    "moviepy.*",
    "pillow.*",
    "gtts.*",
    "dotenv.*",
    "asyncpg.*",
    "feedparser.*",
    "pandas.*",
    "google.cloud.*",
    "openpyxl.*",
    "reportlab.*",
    "pdfplumber.*",
    "gliner.*",
    "dash.*",
    "psycopg2.*",
    "httpx.*",
    "structlog.*"
]
ignore_missing_imports = true

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    ".eggs",
    "*.egg-info"
]

[tool.bandit]
exclude_dirs = ["tests", "test_*"]
skips = ["B101", "B601"]

[tool.pydocstyle]
convention = "google"
add-ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D107"]
