name: Maargha AI CI/CD

on:
  push:
    branches: [ main, dev, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

############################################################
# COMMON STEPS (reusable via YAML anchors)
############################################################

jobs:

# ==========================================================
# LINT JOB TEMPLATE
# ==========================================================

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [orchestrator-service, gateway-service, user-service]

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (same as local)
        uses: actions/setup-python@v4
        with:
          python-version-file: '.python-version'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort flake8 mypy bandit

      - name: Black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: flake8
        run: flake8 .

      - name: mypy
        run: |
          if [ -d "app" ]; then mypy app; fi
          if [ -d "user_service" ]; then mypy user_service; fi

      - name: bandit
        run: |
          if [ -d "app" ]; then bandit -r app; fi
          if [ -d "user_service" ]; then bandit -r user_service; fi


# ==========================================================
# TEST JOB TEMPLATE
# ==========================================================

  tests:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        service: [orchestrator-service, gateway-service, user-service]

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version-file: '.python-version'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt

      - name: Load test environment
        run: cat .github/test.env >> $GITHUB_ENV

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev ffmpeg libsndfile1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fix import paths
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run tests
        run: |
          if [ -d "app" ]; then
            pytest --cov=app --cov-report=xml
          else
            pytest --cov=user_service --cov-report=xml
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/${{ matrix.service }}/coverage.xml


# ==========================================================
# BUILD & PUSH DOCKER
# ==========================================================

  build:
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [orchestrator-service, gateway-service, user-service]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.service }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==========================================================
# DEPLOY (placeholder)
# ==========================================================

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Info
        run: |
          echo "🚀 Images published:"
          echo "ghcr.io/${{ github.repository }}:orchestrator-service-latest"
          echo "ghcr.io/${{ github.repository }}:gateway-service-latest"
          echo "ghcr.io/${{ github.repository }}:user-service-latest"
